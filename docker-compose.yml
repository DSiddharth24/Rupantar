# ─────────────────────────────────────────────────────────────────────────────
# Rupantar — docker-compose.yml
#
# Services:
#   gotenberg   — Office → PDF conversion (LibreOffice headless via Gotenberg)
#   pdf2docx    — PDF → DOCX conversion (pdf2docx-plus FastAPI sidecar)
#   app         — Node.js Express bot
#
# Usage (local dev — run bot outside Docker):
#   docker compose up gotenberg pdf2docx   # start just the two conversion engines
#   npm run dev                            # run the bot locally
#
# Usage (full stack in Docker):
#   docker compose up --build
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Gotenberg ───────────────────────────────────────────────────────────────
  gotenberg:
    image: gotenberg/gotenberg:8
    restart: unless-stopped
    ports:
      - "3000:3000"
    command:
      # Disable unused routes to reduce attack surface
      - "gotenberg"
      - "--api-port=3000"
      - "--api-timeout=300s"
      - "--libreoffice-restart-after=10"
      # Chromium is not needed for Office/PDF conversions — disable it
      - "--chromium-disable-routes=true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Rupantar app ─────────────────────────────────────────────────────────────
  app:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    environment:
      - PORT=3001
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_WHATSAPP_NUMBER=${TWILIO_WHATSAPP_NUMBER}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL}
      - GOTENBERG_URL=http://gotenberg:3000
      - PDF2DOCX_URL=http://pdf2docx:8000
      - REDIS_URL=${REDIS_URL:-}
    depends_on:
      gotenberg:
        condition: service_healthy
      pdf2docx:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── pdf2docx-plus — PDF → DOCX sidecar ───────────────────────────────────
  # Runs the pdf2docx-plus built-in FastAPI REST server.
  # Accepts: POST /convert  multipart file → DOCX bytes
  # Health:  GET  /healthz  → {"status":"ok"}
  #
  # This is the only backend that can produce proper DOCX output from a PDF.
  # Gotenberg (LibreOffice) is intentionally NOT used for this direction —
  # LibreOffice produces corrupted DOCX when given PDF input.
  pdf2docx:
    build:
      context: .
      dockerfile: Dockerfile.pdf2docx
    restart: unless-stopped
    ports:
      - "8001:8000"   # exposed on 8001 so it doesn't clash with other services
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Redis (optional — only needed if you switch session.js to use Redis) ───
  # Uncomment this block and set REDIS_URL=redis://redis:6379 in your .env
  # if you want Redis for session state instead of the default in-process Map.
  #
  # IMPORTANT: persistence is fully disabled here (no RDB, no AOF) so nothing
  # is written to disk — it behaves as a pure in-memory cache that's wiped on
  # restart, consistent with the zero-storage design.
  #
  # redis:
  #   image: redis:7-alpine
  #   restart: unless-stopped
  #   command: >
  #     redis-server
  #     --save ""
  #     --appendonly no
  #     --maxmemory 128mb
  #     --maxmemory-policy allkeys-lru
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 3
